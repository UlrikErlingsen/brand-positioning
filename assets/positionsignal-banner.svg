<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">PositionSignal</title>
  <desc id="desc">PositionSignal, open perceptual mapping. See where brands stand.</desc>
  <defs>
    <linearGradient id="banner-panel" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F5ED"/>
      <stop offset="1" stop-color="#EEF2EC"/>
    </linearGradient>
    <linearGradient id="banner-mark-bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173C3A"/>
      <stop offset="1" stop-color="#0E2928"/>
    </linearGradient>
    <linearGradient id="banner-vector" x1="64" y1="66" x2="100" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#83D2B4"/>
      <stop offset="1" stop-color="#F2C66D"/>
    </linearGradient>
    <filter id="banner-shadow" x="-25" y="-20" width="190" height="195" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173C3A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="300" rx="32" fill="url(#banner-panel)"/>
  <circle cx="1090" cy="-15" r="190" fill="#83D2B4" opacity="0.18"/>
  <circle cx="1130" cy="285" r="145" fill="#F2C66D" opacity="0.18"/>
  <g transform="translate(75 72) scale(1.22)" filter="url(#banner-shadow)">
    <rect width="128" height="128" rx="30" fill="url(#banner-mark-bg)"/>
    <path d="M20 66h88M64 108V20" fill="none" stroke="#315451" stroke-width="4" stroke-linecap="round"/>
    <path d="m102 61 6 5-6 5M59 26l5-6 5 6" fill="none" stroke="#47645E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M64 66 99 30" fill="none" stroke="url(#banner-vector)" stroke-width="6" stroke-linecap="round"/>
    <path d="m88 31 11-1-1 11" fill="none" stroke="#F2C66D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="34" cy="88" r="7" fill="#F2C66D"/>
    <circle cx="40" cy="43" r="6" fill="#F8F5ED"/>
    <circle cx="88" cy="91" r="7" fill="#83D2B4"/>
    <circle cx="81" cy="51" r="9" fill="#D95B40" stroke="#F8F5ED" stroke-width="3"/>
  </g>
  <text x="275" y="132" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#17322E" letter-spacing="-3">Position<tspan fill="#D95B40">Signal</tspan></text>
  <text x="280" y="185" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#47645E">See where brands stand.</text>
  <text x="280" y="224" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#6B7F7A" letter-spacing="2">LOCAL-FIRST  ·  EXPLAINABLE  ·  OPEN SOURCE</text>
</svg>
